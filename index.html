<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Licencias | Registro Oficial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #04080f;
            --surface: #0b1220;
            --surface2: #111c30;
            --accent: #00d4ff;
            --text: #e8edf5;
            --muted: #7a8ba8;
            --green: #00e676;
            --border: rgba(0,212,255,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 500px;
            border-radius: 28px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--accent), #005f73);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-family: 'Syne', sans-serif; 
            font-size: 1.8rem; 
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .header h1 span { color: var(--accent); }
        .header p { color: var(--muted); font-size: 0.95rem; line-height: 1.4; }

        .form-group { margin-bottom: 20px; }
        .label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 212, 255, 0.1); }

        select.input { cursor: pointer; }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #008eb3);
            color: #000;
            border: none;
            border-radius: 50px;
            padding: 16px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .success-msg {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid var(--green);
            color: var(--green);
            border-radius: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Registro <span>Oficial</span></h1>
            <p>Ingresa tus datos para procesar tu solicitud y asignarte un asesor especializado.</p>
        </div>

        <form id="mainForm">
            <div class="form-group">
                <label class="label">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" class="input" placeholder="Ej. Juan Pérez" required>
            </div>

            <div class="form-group">
                <label class="label">Servicio Requerido</label>
                <select id="servicio" name="servicio" class="input" required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="Licencia por Primera Vez">Licencia por Primera Vez</option>
                    <option value="Renovación de Licencia">Renovación de Licencia</option>
                    <option value="Permiso de Conducir">Permiso de Conducir</option>
                    <option value="Homologación / Internacional">Homologación Internacional</option>
                </select>
            </div>

            <div class="form-group">
                <label class="label">Estatus Migratorio Actual</label>
                <select id="estatus" name="estatus" class="input" required>
                    <option value="" disabled selected>Selecciona tu estatus</option>
                    <option value="Pasaporte Vigente">Pasaporte Vigente</option>
                    <option value="Asilo Pendiente / Proceso">Asilo Pendiente / Proceso</option>
                    <option value="Permiso de Trabajo / SSN">Permiso de Trabajo / SSN</option>
                    <option value="Visa de Turista">Visa de Turista</option>
                    <option value="Residente / Ciudadano">Residente / Ciudadano</option>
                </select>
            </div>

            <div class="form-group">
                <label class="label">WhatsApp de Contacto</label>
                <input type="tel" id="whatsapp" name="whatsapp" class="input" placeholder="+1 (000) 000-0000" required>
            </div>

            <button type="submit" id="submitBtn" class="btn">ENVIAR SOLICITUD</button>
        </form>

        <div id="successMsg" class="success-msg">
            <strong>¡Solicitud Enviada!</strong><br>
            Un asesor se comunicará contigo vía WhatsApp a la brevedad.
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsWH-MZqVJREoPQEkTuZXE10S3bhRwItmvJBvyhZea0SQtf2cCfobnIH7jekZamVVb/exec";

        // --- 1. RASTREADOR INVISIBLE DE VISITANTES ---
        (function() {
            const VISITOR_KEY = 'v_internal_id';
            let vId = localStorage.getItem(VISITOR_KEY);
            let isNew = false;

            if (!vId) {
                vId = 'USR-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem(VISITOR_KEY, vId);
                isNew = true;
            }

            // Envío silencioso al abrir la página
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: new URLSearchParams({
                    'action': 'counter',
                    'visitorId': vId,
                    'isNew': isNew
                })
            });
        })();

        // --- 2. GESTIÓN DEL FORMULARIO ---
        document.getElementById('mainForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const form = e.target;
            
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            const formData = new FormData(form);
            formData.append('action', 'submit_form'); // Para diferenciar en el Excel

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });

                form.style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            } catch (error) {
                console.error("Error:", error);
                alert("Hubo un error al enviar. Por favor intente de nuevo.");
                btn.disabled = false;
                btn.innerText = "ENVIAR SOLICITUD";
            }
        });
    </script>
</body>
</html>
