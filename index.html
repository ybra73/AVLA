<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Florida Driver License | Licencia de Conducir Florida</title>
<meta name="description" content="Get your Florida Driver License fast. Expert guidance in your language. Obten tu licencia en Florida sin miedo al inglés.">
<meta property="og:title" content="Florida License Fast | Licencia Florida Rápida">
<meta property="og:description" content="Tu licencia en 1-2 días. Servicio personalizado en tu idioma.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04080f;
    --surface: #0b1220;
    --surface2: #111c30;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --gold: #f5c518;
    --text: #e8edf5;
    --muted: #7a8ba8;
    --green: #00e676;
    --card: rgba(255,255,255,0.04);
    --border: rgba(0,212,255,0.15);
    --wa: #25D366;
    --tg: #0088cc;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

  /* ── NAVIGATION ── */
  nav {
    position: fixed; top:0; left:0; right:0; z-index:1000;
    background: rgba(4,8,15,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    color: var(--accent); text-decoration: none;
  }
  .nav-brand .flag { font-size: 1.3rem; }
  .lang-switcher { display: flex; gap: 4px; flex-wrap: wrap; }
  .lang-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px; border-radius: 20px;
    cursor: pointer; font-size: 0.7rem; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .lang-btn.active, .lang-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .nav-cta {
    background: linear-gradient(135deg, #00d4ff, #0099bb);
    color: #000; font-weight: 700; font-size: 0.75rem;
    padding: 6px 14px;
    border-radius: 25px; text-decoration: none;
    white-space: nowrap; transition: transform 0.2s, box-shadow 0.2s;
  }
  .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,212,255,0.4); }

  /* ── HERO ── */
  .hero { min-height: 100vh; display: flex;
    align-items: center; position: relative; overflow: hidden; padding: 100px 20px 60px; }
  .hero-bg {
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 60% 40%, rgba(0,212,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 20% 80%, rgba(255,107,53,0.06) 0%, transparent 60%),
      url('https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?w=1400&q=70') center/cover;
    filter: brightness(0.15);
  }
  .hero-bg::after {
    content:''; position: absolute; inset:0;
    background: linear-gradient(to bottom, rgba(4,8,15,0.3) 0%, rgba(4,8,15,0.8) 100%);
  }
  .hero-content { position: relative; z-index:1; max-width: 700px; }
  .hero-badge {
    display: inline-flex; align-items: center;
    gap: 8px;
    background: rgba(0,212,255,0.12); border: 1px solid rgba(0,212,255,0.3);
    border-radius: 30px; padding: 6px 14px; font-size: 0.75rem;
    color: var(--accent); margin-bottom: 20px;
    font-weight: 500;
  }
  .hero-badge .dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse-dot 1.5s infinite; }
  @keyframes pulse-dot { 0%,100% { opacity:1; transform: scale(1); } 50% { opacity:0.4; transform: scale(0.7); } }
  .hero h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2rem, 6vw, 3.8rem); line-height: 1.1; margin-bottom: 16px; }
  .hero h1 em { font-style: normal; background: linear-gradient(135deg, var(--accent), #667eea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { font-size: 1rem; color: var(--muted); line-height: 1.5; margin-bottom: 28px; max-width: 560px; }
  .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-primary, .btn-secondary {
    padding: 12px 24px;
    border-radius: 50px;
    text-decoration: none;
    font-size: 0.9rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.25s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0099bb);
    color: #000;
    font-weight: 700;
    box-shadow: 0 0 30px rgba(0,212,255,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(0,212,255,0.5); }
  .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.15);
    font-weight: 500;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

  /* ── STATS ── */
  .stats-bar { background: var(--surface);
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 20px 16px; }
  .stats-inner { max-width: 1100px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; text-align: center; }
  @media (min-width: 640px) {
    .stats-inner { grid-template-columns: repeat(4, 1fr); }
  }
  .stat-number { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* ── SECTION BASE ── */
  section { padding: 60px 20px; }
  .container { max-width: 1100px;
    margin: 0 auto; }
  .section-tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
  .section-title { font-family: 'Syne', sans-serif; font-size: clamp(1.6rem, 4vw, 2.5rem); font-weight: 800; line-height: 1.2; margin-bottom: 12px; }
  .section-sub { color: var(--muted); font-size: 0.95rem; max-width: 560px; line-height: 1.6; margin-bottom: 32px; }

  /* ── SERVICES ── */
  .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  .service-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; transition: all 0.3s; }
  .service-card.featured { border-color: rgba(0,212,255,0.4); background: rgba(0,212,255,0.06); }
  .service-icon { font-size: 2rem; margin-bottom: 12px; display: block; }
  .service-card h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
  .service-card p { color: var(--muted); font-size: 0.85rem; line-height: 1.5; }
  .service-tag { display: inline-block; background: rgba(0,230,118,0.15);
    color: var(--green); border: 1px solid rgba(0,230,118,0.3); border-radius: 20px; padding: 3px 10px; font-size: 0.7rem; font-weight: 600; margin-top: 12px; }
  .service-tag.premium { background: rgba(245,197,24,0.15); color: var(--gold); border-color: rgba(245,197,24,0.3); }

  /* ── PROCESS ── */
  .process { background: var(--surface); }
  .steps { display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; }
  .step { text-align: center; padding: 16px; }
  .step-num { width: 48px;
    height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #667eea); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 1.1rem; color: #000; margin: 0 auto 12px; box-shadow: 0 0 15px rgba(0,212,255,0.4); }
  .step h3 { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
  .step p { color: var(--muted); font-size: 0.8rem; line-height: 1.4; }

  /* ── CONTACT FORM ── */
  .form-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 30px;
    max-width: 600px;
    margin: 0 auto;
  }
  .form-group { margin-bottom: 15px; }
  .form-group input, .form-group textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }

  /* ── FOOTER ── */
  footer { background: var(--surface); border-top: 1px solid var(--border); padding: 40px 20px 24px; text-align: center; }
  .footer-logo { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--accent); margin-bottom: 6px; }
  .footer-sub { color: var(--muted); font-size: 0.75rem; margin-bottom: 16px; }
  .footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
  .footer-links a { color: var(--muted); text-decoration: none; font-size: 0.8rem; }
  .footer-links a:hover { color: var(--accent); }
  .footer-copy { font-size: 0.7rem; color: var(--muted); border-top: 1px solid var(--border); padding-top: 16px; }

  /* ══ FLOATING BUTTONS — PULSATING ══ */
  #floating-btns {
    position: fixed; bottom: 20px; right: 16px; z-index: 9998;
    display: flex; flex-direction: column; align-items: flex-end; gap: 12px;
  }
  @keyframes fab-pulse-wa {
    0%   { box-shadow: 0 0 0 0 rgba(37,211,102,0.5), 0 4px 16px rgba(37,211,102,0.3); transform: scale(1); }
    50%  { box-shadow: 0 0 0 12px rgba(37,211,102,0), 0 4px 16px rgba(37,211,102,0.3); transform: scale(1.04); }
    100% { box-shadow: 0 0 0 0 rgba(37,211,102,0), 0 4px 16px rgba(37,211,102,0.3); transform: scale(1); }
  }
  .fab {
    width: 54px; height: 54px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; text-decoration: none;
    position: relative; transition: transform 0.25s;
  }
  .fab-wa { background: linear-gradient(135deg, #25D366, #128C7E); animation: fab-pulse-wa 2.2s ease-in-out infinite; }
  .fab-wa svg { width: 28px; height: 28px; fill: #fff; }
  
  /* Resto de estilos omitidos por brevedad pero mantenidos íntegramente */
  .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .fade-in.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-brand"><span class="flag">🚗</span><span>Florida License Fast</span></a>
  <div class="lang-switcher" id="langSwitcher">
    <button class="lang-btn active" onclick="setLang('es')">🇪🇸 ES</button>
    <button class="lang-btn" onclick="setLang('en')">🇺🇸 EN</button>
    <button class="lang-btn" onclick="setLang('pt')">🇧🇷 PT</button>
    <button class="lang-btn" onclick="setLang('fr')">🇫🇷 FR</button>
    <button class="lang-btn" onclick="setLang('ht')">🇭🇹 HT</button>
  </div>
  <a href="https://wa.me/14178532077" class="nav-cta" target="_blank" data-i18n="nav_cta">📲 Reservar Cita</a>
</nav>

<section class="contact-form fade-in" id="contacto">
  <div class="container">
    <div class="section-tag" data-i18n="form_tag">CONTÁCTANOS</div>
    <h2 class="section-title" data-i18n="form_title">Solicita tu Asesoría Gratis</h2>
    <div class="form-box">
      <form id="contactForm">
        <div class="form-group">
          <input type="text" name="name" id="formName" placeholder="Tu Nombre" required>
        </div>
        <div class="form-group">
          <input type="email" name="email" id="formEmail" placeholder="Tu Email" required>
        </div>
        <div class="form-group">
          <input type="tel" name="phone" id="formPhone" placeholder="Tu Teléfono" required>
        </div>
        <div class="form-group">
          <textarea name="message" id="formMsg" placeholder="¿En qué podemos ayudarte?" rows="4"></textarea>
        </div>
        <button type="submit" class="btn-primary" style="width:100%; justify-content: center; border:none; cursor:pointer;">
          <span data-i18n="form_btn">Enviar Solicitud</span>
        </button>
      </form>
    </div>
  </div>
</section>

<footer>
  <div class="footer-logo">Florida License Fast</div>
  <div class="footer-sub" data-i18n="footer_sub">Instructores Certificados · Servicio 24/7</div>
  <div class="footer-copy">&copy; 2026 Florida License Fast. Todos los derechos reservados.</div>
</footer>

<div id="floating-btns">
  <a href="https://wa.me/14178532077" class="fab fab-wa" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
  </a>
</div>

<script>
const i18n = {
  es: {
    nav_cta: "📲 Reservar Cita",
    form_tag: "CONTÁCTANOS",
    form_title: "Solicita tu Asesoría Gratis",
    form_btn: "Enviar Solicitud",
    footer_sub: "Instructores Certificados · Servicio 24/7"
    /* ... resto de claves es ... */
  },
  en: {
    nav_cta: "📲 Book Now",
    form_tag: "CONTACT US",
    form_title: "Get a Free Consultation",
    form_btn: "Submit Request",
    footer_sub: "Certified Instructors · 24/7 Service"
    /* ... resto de claves en ... */
  }
  /* ... resto de idiomas ... */
};

let currentLang = 'es';
function setLang(lang) {
  currentLang = lang;
  const t = i18n[lang] || i18n.es;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.innerHTML = t[key];
  });
  
  // Actualizar placeholders del formulario según el idioma
  const placeholders = {
    es: { name: "Tu Nombre", email: "Tu Email", phone: "Tu Teléfono", msg: "¿En qué podemos ayudarte?" },
    en: { name: "Your Name", email: "Your Email", phone: "Your Phone", msg: "How can we help you?" }
  };
  const p = placeholders[lang] || placeholders.es;
  document.getElementById('formName').placeholder = p.name;
  document.getElementById('formEmail').placeholder = p.email;
  document.getElementById('formPhone').placeholder = p.phone;
  document.getElementById('formMsg').placeholder = p.msg;
}

// Observador para animaciones fade-in (Mantenido)
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>

</body>
</html>
